<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangrove Farm Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1e293b; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #0f172a; font-size: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1); text-align: center; }
        .card h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 10px; }
        .value { font-size: 2.5rem; font-weight: 700; color: #0ea5e9; }
        .unit { font-size: 1rem; font-weight: 400; color: #94a3b8; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .status-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; }
        .led { width: 20px; height: 20px; border-radius: 50%; background: #94a3b8; }
        .led.on { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .led.off { background: #ef4444; }
        .alert-badge { background: #fef3c7; color: #92400e; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .timestamp { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #64748b; }
        .loading { opacity: 0.7; }
        .error { color: #ef4444; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1> Mangrove & Coastal Farm Monitor</h1>
        
        <div class="grid">
            <div class="card">
                <h3> Temperature</h3>
                <div><span class="value" id="temp">--</span><span class="unit"> °C</span></div>
            </div>
            <div class="card">
                <h3> Humidity</h3>
                <div><span class="value" id="hum">--</span><span class="unit"> %</span></div>
            </div>
            <div class="card">
                <h3> Soil Moisture</h3>
                <div><span class="value" id="soil">--</span><span class="unit"> %</span></div>
            </div>
            <div class="card">
                <h3> Water Level</h3>
                <div><span class="value" id="water">--</span><span class="unit"> %</span></div>
            </div>
            <div class="card">
                <h3> Light Intensity</h3>
                <div><span class="value" id="light">--</span><span class="unit"> lux</span></div>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="led" id="gateLed"></div>
                <div>
                    <strong>Flood Gate</strong><br>
                    <span id="gateStatus">--</span>
                </div>
            </div>
            <div class="status-card">
                <div class="led" id="pumpLed"></div>
                <div>
                    <strong>Pump / Aerator</strong><br>
                    <span id="pumpStatus">--</span>
                </div>
            </div>
            <div class="status-card">
                <div>
                    <strong> Alerts</strong><br>
                    <span id="alerts">None</span>
                </div>
            </div>
        </div>
        
        <div class="timestamp" id="lastUpdate">Last update: --</div>
    </div>

    <script>
        // ===================== CONFIGURATION =====================
        const CHANNEL_ID = '3356613';          // ← Replace with your ThingSpeak Channel ID
        const READ_API_KEY = 'LKOZL4UHWD9GL50D'; 
        const UPDATE_INTERVAL = 5000;                  // Refresh every 5 seconds

        // ThingSpeak field mapping (adjust according to your channel setup)
        const FIELDS = {
            temperature: 1,   // Field 1 in your channel
            humidity: 2,      // Field 2
            soilMoisture: 3,  // Field 3
            waterLevel: 4,    // Field 4
            light: 5,         // Field 5
            gateStatus: 6,    // Field 6  (0 = closed, 1 = open)
            pumpStatus: 7     // Field 7  (0 = off, 1 = on)
        };

        // ===================== FETCH DATA =====================
        async function fetchData() {
            const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${READ_API_KEY}&results=1`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                
                if (data.feeds && data.feeds.length > 0) {
                    const feed = data.feeds[0];
                    updateUI(feed);
                } else {
                    showError('No data received yet.');
                }
            } catch (error) {
                showError('Failed to fetch data. Check connection / API key.');
                console.error(error);
            }
        }

        function updateUI(feed) {
            // Sensor values (with fallback to '--')
            document.getElementById('temp').textContent = feed.field1 || '--';
            document.getElementById('hum').textContent = feed.field2 || '--';
            document.getElementById('soil').textContent = feed.field3 || '--';
            document.getElementById('water').textContent = feed.field4 || '--';
            document.getElementById('light').textContent = feed.field5 || '--';
            
            // Gate status (field6)
            const gate = parseInt(feed.field6);
            const gateLed = document.getElementById('gateLed');
            const gateText = document.getElementById('gateStatus');
            if (gate === 1) {
                gateLed.className = 'led on';
                gateText.textContent = 'Open';
            } else if (gate === 0) {
                gateLed.className = 'led off';
                gateText.textContent = 'Closed';
            } else {
                gateLed.className = 'led';
                gateText.textContent = 'Unknown';
            }
            
            // Pump status (field7)
            const pump = parseInt(feed.field7);
            const pumpLed = document.getElementById('pumpLed');
            const pumpText = document.getElementById('pumpStatus');
            if (pump === 1) {
                pumpLed.className = 'led on';
                pumpText.textContent = 'ON';
            } else if (pump === 0) {
                pumpLed.className = 'led off';
                pumpText.textContent = 'OFF';
            } else {
                pumpLed.className = 'led';
                pumpText.textContent = 'Unknown';
            }
            
            // Alerts (derived from water level and temperature thresholds)
            const waterVal = parseFloat(feed.field4);
            const tempVal = parseFloat(feed.field1);
            let alertMsg = 'None';
            if (waterVal > 80) alertMsg = '⚠️ High Water Level';
            if (tempVal > 35) alertMsg += (alertMsg !== 'None' ? ' & ' : '') + '🌡️ High Temperature';
            document.getElementById('alerts').textContent = alertMsg;
            
            // Timestamp
            const date = new Date(feed.created_at);
            document.getElementById('lastUpdate').textContent = 'Last update: ' + date.toLocaleString();
            document.querySelector('.container').classList.remove('loading');
        }

        function showError(msg) {
            document.getElementById('lastUpdate').innerHTML = `<span class="error">${msg}</span>`;
        }

        // Initial fetch and set interval
        fetchData();
        setInterval(fetchData, UPDATE_INTERVAL);
    </script>
</body>
</html>
